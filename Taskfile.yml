# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

silent: true

tasks:
  default:
    cmds:
      - task: run
    desc: Run the application

  init:
    cmds:
      - bun install
    desc: Install dependencies

  run:
    cmds:
      - bun run dev
    desc: Run the application
